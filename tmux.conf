set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

unbind %
bind | split-window -h 

unbind '"'
bind - split-window -v

unbind r
bind r source-file ~/.config/tmux/tmux.conf

bind j resize-pane -D 5
bind k resize-pane -U 5
bind l resize-pane -R 5
bind h resize-pane -L 5

bind -r m resize-pane -Z

set -g mouse on

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"
bind-key -T copy-mode-vi 'y' send -X copy-selection # copy text with "y"

unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode when dragging with mouse

# remove delay for exiting insert mode with ESC in Neovim
set -sg escape-time 10

# clear CLAUDECODE env var (prevents "nested session" errors if tmux was started from Claude Code)
set-environment -g -u CLAUDECODE

# sesh: smart session manager (integrates with zoxide)
bind-key "T" display-popup -E -w 40% -h 50% \
  "sesh connect \"$(sesh list -i | fzf --no-sort --ansi --border-label ' sesh ' --prompt '⚡ ')\""

# Claude Code: popup in current directory
bind-key "C" display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "env -u CLAUDECODE claude"

# tpm plugin
set -g @plugin 'tmux-plugins/tpm'

# list of tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes
set -g @plugin 'tmux-plugins/tmux-yank' # copy to system clipboard from copy mode
set -g @plugin 'Morantron/tmux-fingers' # hint-based text/URL selection
set -g @plugin 'alexwforsythe/tmux-which-key' # keybinding discovery menu (prefix + /)

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# scrollback buffer (default 2000 is too small for build outputs)
set -g history-limit 50000

# enable focus events (needed for neovim autoread and gitsigns refresh)
set -g focus-events on

# Tokyo Night theme
set -g status-position top
set -g status-style "bg=#1a1b26,fg=#c0caf5"
set -g status-interval 5

# session name (green, yellow on prefix)
set -g status-left "#{?client_prefix,#[fg=#1a1b26 bg=#e0af68 bold],#[fg=#1a1b26 bg=#9ece6a bold]}  #S #[fg=default bg=default] "
set -g status-left-length 30

# window (tab) styling
set -g window-status-format "#[fg=#565f89] #I:#W "
set -g window-status-current-format "#[fg=#1a1b26,bg=#7aa2f7,bold] #I:#W "
set -g window-status-separator ""

# smart adaptive status-right (shows more info when fewer tabs)
set -g status-right-length 80
set -g status-right "#(~/.config/tmux/smart-status.sh)"

# pane border colors
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"

# plugin manager path (XDG location)
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins/'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
